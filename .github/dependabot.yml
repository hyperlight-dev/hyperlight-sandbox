version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Rust (root workspace)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # wasmtime (indirect, via hyperlight-wasm) must stay aligned with the
      # hyperlight-wasm-aot CLI that compiles .aot guest binaries.  The AOT
      # compiler is installed from a pinned git rev and uses its own Cargo.lock,
      # so a workspace-only bump creates a version mismatch at runtime.
      # Update wasmtime only when hyperlight-wasm itself is updated.
      - dependency-name: "wasmtime"
      - dependency-name: "wasmtime-*"

  # Rust (Python wasm backend — separate workspace)
  - package-ecosystem: "cargo"
    directory: "/src/sdk/python/wasm_backend"
    schedule:
      interval: "weekly"

  # Rust (Python hyperlight-js backend — separate workspace)
  - package-ecosystem: "cargo"
    directory: "/src/sdk/python/hyperlight_js_backend"
    schedule:
      interval: "weekly"

  # Rust (Python pyo3 common — separate workspace)
  - package-ecosystem: "cargo"
    directory: "/src/sdk/python/pyo3_common"
    schedule:
      interval: "weekly"

  # Python (uv/pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # npm (JavaScript guest)
  - package-ecosystem: "npm"
    directory: "/src/wasm_sandbox/guests/javascript"
    schedule:
      interval: "weekly"
