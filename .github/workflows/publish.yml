name: Publish Python SDK

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    if: ${{ !github.event.act }}
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606  # v1.15.4
        with:
          cache-key: release
          rustflags: ""

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Install Python
        run: uv python install 3.12

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "latest"
          cache: npm
          cache-dependency-path: src/wasm_sandbox/guests/javascript/package-lock.json

      - name: Install just
        run: cargo install --locked just

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install JS guest dependencies
        run: just wasm js-guest-install

      - name: Build guests
        run: |
          just wasm guest-build
          just wasm js-guest-build

      - name: Build & Publish
        if: ${{ !env.ACT }}
        run: just python python-publish
